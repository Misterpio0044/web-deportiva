services:
  postgres:
    image: postgres:16-alpine
    container_name: web-deportiva-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: web_deportiva
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/infrastructure/database/migrations:/docker-entrypoint-initdb.d

volumes:
  postgres_data:
